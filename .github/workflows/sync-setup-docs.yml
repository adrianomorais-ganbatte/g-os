name: Sync Setup Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/guides/GITHUB_PACKAGES_SETUP.md'
      - 'docs/guides/SETUP_NOVA_MAQUINA.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework
        uses: actions/checkout@v4

      - name: Checkout setup repo
        uses: actions/checkout@v4
        with:
          repository: imdouglasoliveira/setup-a8z-framwork
          path: setup-repo
          token: ${{ secrets.SETUP_A8Z_FRAMWORK }}

      - name: Copy docs
        run: |
          cp docs/guides/GITHUB_PACKAGES_SETUP.md setup-repo/GITHUB_PACKAGES_SETUP.md
          cp docs/guides/SETUP_NOVA_MAQUINA.md setup-repo/SETUP_NOVA_MAQUINA.md

      - name: Commit and push
        working-directory: setup-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GITHUB_PACKAGES_SETUP.md SETUP_NOVA_MAQUINA.md
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "docs: sync from a8z-framework"
            git push
          fi
