name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm v11 locally (avoids self-upgrade conflict)
        run: |
          mkdir -p "$HOME/npm11"
          npm install --prefix "$HOME/npm11" npm@11
          echo "$HOME/npm11/node_modules/.bin" >> $GITHUB_PATH

      - name: Verify npm v11 is active
        run: npm --version

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Bump current version
        run: |
          npm version patch -m "chore(release): bump version to %s [skip ci]"

      - name: Validate tarball contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          grep -q ".gos/scripts/cli/gos-cli.js" pack-output.txt || (echo "FAIL: .gos/scripts/cli/gos-cli.js missing from tarball" && exit 1)
          grep -q ".gos/scripts/integrations/setup-ide-adapters.js" pack-output.txt || (echo "FAIL: setup-ide-adapters.js missing from tarball" && exit 1)

      - name: Verify bin targets exist
        run: node -e "const p=require('./package.json'); for(const k in p.bin){require('fs').accessSync(p.bin[k]); console.log('OK bin['+k+']:',p.bin[k])}"

      - name: Push version bump
        run: git push --follow-tags

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify registry metadata post-publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Verifying registry metadata for ganbatte-os@$VERSION (registry propagation pode levar ate ~1min)..."
          BIN=""
          for i in $(seq 1 12); do
            # if/&& isenta o comando do 'bash -e'; --prefer-online forca leitura fresca (ignora cache local)
            if BIN=$(npm view "ganbatte-os@$VERSION" bin --json --prefer-online 2>/dev/null) && [ -n "$BIN" ]; then
              echo "Tentativa $i: metadata disponivel no registro."
              break
            fi
            echo "Tentativa $i/12: versao $VERSION ainda nao visivel no registro, aguardando 15s..."
            sleep 15
            BIN=""
          done
          echo "Registry bin for $VERSION: $BIN"
          echo "$BIN" | grep -q "gos-cli.js" || (echo "FAIL: bin field ausente na metadata do registro para $VERSION apos as tentativas" && exit 1)
