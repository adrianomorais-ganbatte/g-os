name: design-squad
version: "1.0.0"
short-title: "Design Squad"
description: "Squad de design operations — 3 experts (Brad Frost, Dan Mall, Dave Malouf) + 4 especialistas + 1 orquestrador. Design systems, UX, UI, visual."
author: "Synkra AIOS"
license: MIT
slashPrefix: "design-squad"

aios:
  minVersion: "4.0.0"
  type: squad

tags:
  - design-systems
  - ux
  - ui
  - atomic-design
  - components
  - design-ops
  - visual-design

components:
  agents:
    - design-chief.md
    - brad-frost.md
    - dan-mall.md
    - dave-malouf.md
    - ux-designer.md
    - design-system-architect.md
    - visual-generator.md
    - ui-engineer.md
  tasks:
    - audit-design.md
    - create-component-spec.md
    - create-design-system.md
    - design-ux-flow.md
    - diagnose.md
    - generate-handoff.md
    - review.md
    - setup-design-ops.md
  workflows:
    - wf-design-system-creation.yaml
    - wf-feature-design.yaml
  checklists:
    - output-quality.md

delegation:
  context_isolation:
    exclude_from_subagents:
      - previous_design_iterations
      - unrelated_component_specs
      - raw_audit_logs
    pass_to_subagents:
      - design_tokens
      - breakpoints
      - existing_components_list
      - brand_guidelines
  general_purpose_agent:
    description: "Tarefas de design que nao mapeiam a especialistas existentes"
    model_tier: sonnet
  proactive_agents:
    - agent: brad-frost
      trigger_after: [create-component-spec, create-design-system]
      action: "Validar conformidade atomic design automaticamente"

knowledge_bases:
  - path: libraries/ui-ux-data/ux-best-practices.md
    description: "60+ heuristicas UX consolidadas de 11 fontes (NN Group, Baymard, Figma, Mendix, Designlab)"
    usage: "Carregar como referencia em audit-design, review, design-ux-flow e create-component-spec"
  - path: libraries/ui-ux-data/ux-guidelines.csv
    description: "Dataset de guidelines UX estruturado"
  - path: libraries/content/ai-writing-patterns.md
    description: "Padroes de escrita artificial para evitar em deliverables de design"

references:
  - url: https://www.figma.com/pt-br/resource-library/principios-design-ui/
    topic: UI design principles
  - url: https://www.nngroup.com/articles/strategies-complex-application-design/
    topic: Complex application design strategies
  - url: https://baymard.com/learn/ux-design-principles
    topic: Research-backed UX principles (e-commerce focus)
  - url: https://docs.mendix.com/howto/front-end/ux-best-practices/
    topic: Enterprise/low-code UX best practices
  - url: https://designlab.com/blog/form-ui-design-best-practices
    topic: Form design patterns

config:
  extends: extend
